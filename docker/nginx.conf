# Static-export server for the Next.js landing page.
# Listens on 8080 to match the non-root nginx-unprivileged base image.
server {
    listen       8080;
    server_name  _;
    root         /usr/share/nginx/html;
    index        index.html;

    # Don't leak the nginx version.
    server_tokens off;

    # Security headers (HSTS is omitted here — terminate TLS at the edge/CDN).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # `output: 'export'` + `trailingSlash: true` emits /route/index.html.
    # Try the exact file, the directory, the .html variant, then 404.
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Hashed Next.js build assets are immutable — cache them hard.
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Static export generates a 404.html page.
    error_page 404 /404.html;
}
