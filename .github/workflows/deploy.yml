name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege default; the deploy job elevates only what it needs.
permissions:
  contents: read

# Cancel superseded PR runs; never cancel an in-flight main run (so deploys finish).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  NODE_VERSION: 'lts/*'
  NEXT_TELEMETRY_DISABLED: '1'

jobs:
  # ── 1. Quality gates — lint, format, types ────────────────────────────────
  quality:
    name: Lint · Format · Types
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier check
        run: npm run format:check
      - name: TypeScript check
        run: npm run typecheck

  # ── 2. Production build (static export → ./out) ───────────────────────────
  build:
    name: Build (static export)
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: Next build
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_APP_URL: ${{ vars.NEXT_PUBLIC_APP_URL }}
          NEXT_PUBLIC_SEO_INDEX: 'true'
          # Sentry: DSN baked into the client bundle; auth token uploads source maps.
          # All optional — build succeeds (upload just skipped) when unset.
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # ── 3. Docker build validation (build only, no push) ──────────────────────
  docker:
    name: Docker build validation
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (validation only)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: applyhustle-landing:ci
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ vars.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_APP_URL=${{ vars.NEXT_PUBLIC_APP_URL }}
            NEXT_PUBLIC_SEO_INDEX=true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 4. Deploy to GitHub Pages — only on push to main, after all checks ─────
  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build, docker]
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: github-pages
      cancel-in-progress: false
    steps:
      - name: Deploy artifact to Pages
        id: deployment
        uses: actions/deploy-pages@v4
